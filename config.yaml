# ABox configuration

debug: true
addr: ":8080"

auth:
  enabled: true
  jwt_secret: "abox-dev-secret-2026"

server:
  type: http
  config:
    addr: ":8080"

store:
  type: sqlite
  config:
    path: ./data/agentbox.db

storage:
  type: local
  config:
    root: ./data/artifacts

executor:
  type: docker
  config:
    image: agentbox-sandbox:latest
